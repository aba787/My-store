kind = "web"
previewPath = "/"
title = "آدا - منصة التعلم الرقمي"
version = "1.0.0"
id = "artifacts/ada-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20299

[services.development]
run = "pnpm --filter @workspace/ada-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ada-platform", "run", "build" ]
publicDir = "artifacts/ada-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20299"
BASE_PATH = "/"
